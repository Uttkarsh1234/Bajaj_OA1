<!DOCTYPE html>

<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

  <title>BFHL Hierarchy Analyzer</title>

  <link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

    <h1>BFHL Hierarchy Analyzer</h1>

    <div class="input-box">

        <textarea

          id="inputData"

          placeholder="Enter data separated by commas

Example:

A->B

A->C

B->D"

        ></textarea>

    </div>

    <button id="submitBtn">

       Analyze

    </button>

    <div id="error"></div>

    <div id="results"></div>

</div>

<script src="script.js"></script>

</body>

</html>
